name: CI — Build and Push Docker

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'        # Chỉ chạy workflow này khi có file nào đó trong thư mục /app thay đổi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo code từ GitHub về máy ảo của GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Tạo một cái Tag phiên bản (vd: v1.20260609123000) dựa vào thời gian
      - name: Get version
        id: version
        run: echo "TAG=v1.$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      # Bước 3: Đăng nhập vào Docker Hub bằng cái Secret bạn vừa tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Tự động chạy lệnh docker build và docker push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gitops-web:latest
            ${{ secrets.DOCKER_USERNAME }}/gitops-web:${{ steps.version.outputs.TAG }}

      # Bước 5 (Cốt lõi của GitOps): Sửa tên phiên bản image mới trong file k8s/deployment.yaml và tự commit lên GitHub
      - name: Update image tag in manifest
        run: |
          sed -i "s|image: .*/gitops-web:.*|image: ${{ secrets.DOCKER_USERNAME }}/gitops-web:${{ steps.version.outputs.TAG }}|" k8s/deployment.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/deployment.yaml
          git commit -m "CI: update image to ${{ steps.version.outputs.TAG }}"
          git push
