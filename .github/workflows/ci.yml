name: CI — Build and Push Docker

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'        # Chỉ chạy workflow này khi có file nào đó trong thư mục /app thay đổi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "TAG=v1.$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gitops-web:latest
            ${{ secrets.DOCKER_USERNAME }}/gitops-web:${{ steps.version.outputs.TAG }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gitops-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/gitops-backend:${{ steps.version.outputs.TAG }}

      - name: Update image tags in manifests
        run: |
          sed -i "s|image: .*/gitops-web:.*|image: ${{ secrets.DOCKER_USERNAME }}/gitops-web:${{ steps.version.outputs.TAG }}|" k8s/frontend/deployment.yaml
          sed -i "s|image: .*/gitops-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/gitops-backend:${{ steps.version.outputs.TAG }}|" k8s/backend/rollout.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/frontend/deployment.yaml k8s/backend/rollout.yaml
          git commit -m "CI: update images to ${{ steps.version.outputs.TAG }}"
          git push
