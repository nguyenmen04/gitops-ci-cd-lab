apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-backend-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nguyenmen04/gitops-ci-cd-lab.git
    targetRevision: main
    path: k8s/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
