apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-web-app
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/nguyenmen04/gitops-ci-cd-lab.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
