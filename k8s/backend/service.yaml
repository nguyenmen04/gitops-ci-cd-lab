apiVersion: v1
kind: Service
metadata:
  name: gitops-backend
  namespace: default
  labels:
    app: gitops-backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: gitops-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30081
  type: NodePort
